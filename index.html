<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Elite AI - Dashboard Premium</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --p-purple: #8b5cf6; --p-purple-dark: #6d28d9; --p-glow: rgba(139, 92, 246, 0.5);
            --bg-deep: #050508; --bg-card: #0f0f1a; --bg-elevated: #1a1a2e;
            --text-high: #ffffff; --text-mid: #94a3b8; --text-low: #475569;
            --s-green: #10b981; --s-red: #ef4444; --s-amber: #f59e0b;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-deep); color: var(--text-high); overflow-x: hidden; min-height: 100vh; line-height: 1.5; }

        /* Scrollbar Premium */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--p-purple-dark); border-radius: 10px; }

        /* Camadas de Z-Index */
        .z-base { z-index: 1; }
        .z-interact { z-index: 100; }
        .z-overlay { z-index: 1000; }
        .z-max { z-index: 9999; }

        /* -----------------------------------------
           SISTEMA DE NOTIFICAÇÕES (UI RECURSIVA)
        ------------------------------------------ */
        #notification-container {
            position: fixed; top: 20px; right: 20px; width: 320px;
            display: flex; flex-direction: column; gap: 10px; z-index: 10000;
        }
        .notif {
            background: var(--bg-elevated); border-left: 4px solid var(--p-purple);
            padding: 16px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: flex-start; gap: 12px;
            animation: slideIn 0.5s forwards, fadeOut 0.5s 4.5s forwards;
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
        }
        .notif.success { border-left-color: var(--s-green); }
        .notif.error { border-left-color: var(--s-red); }
        .notif.warn { border-left-color: var(--s-amber); }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }

        /* -----------------------------------------
           DASHBOARD LAYOUT
        ------------------------------------------ */
        #main-wrapper { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; opacity: 0; transition: var(--transition); }
        #main-wrapper.auth-active { opacity: 1; }

        /* Sidebar Profissional */
        aside {
            background: var(--bg-card); border-right: 1px solid var(--glass-border);
            padding: 30px 20px; display: flex; flex-direction: column;
        }
        .nav-link {
            padding: 14px 18px; border-radius: 12px; color: var(--text-mid);
            text-decoration: none; margin-bottom: 8px; transition: var(--transition);
            display: flex; align-items: center; gap: 12px; font-weight: 500;
        }
        .nav-link:hover, .nav-link.active {
            background: var(--glass); color: var(--p-purple); transform: translateX(5px);
        }

        /* Área de Conteúdo */
        main { padding: 40px; overflow-y: auto; max-height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* -----------------------------------------
           CARROSSEL 3D ENGINE (REESTRUTURADO)
        ------------------------------------------ */
        .carousel-container {
            position: relative; height: 300px; width: 100%;
            perspective: 2000px; display: flex; justify-content: center; align-items: center;
            margin-bottom: 50px;
        }
        .carousel-3d-scene {
            position: relative; width: 350px; height: 200px;
            transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .c-card {
            position: absolute; width: 100%; height: 100%;
            border-radius: 24px; padding: 30px;
            background: linear-gradient(135deg, var(--bg-elevated) 0%, #1a1a35 100%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: space-between; transition: var(--transition);
            pointer-events: none; /* Só o ativo recebe clique via JS logic */
        }
        .c-card.active { pointer-events: auto; transform: translateZ(100px); border-color: var(--p-purple); }
        
        /* -----------------------------------------
           SISTEMA DE INTELIGÊNCIA ARTIFICIAL (IA) UI
        ------------------------------------------ */
        .ai-assistant-bar {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 15px 25px; margin-bottom: 30px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
        }
        #ai-input {
            background: transparent; border: none; color: white; flex: 1;
            font-size: 16px; outline: none;
        }
        .ai-suggestion-box {
            position: absolute; background: var(--bg-elevated); border-radius: 12px;
            width: 100%; max-width: 400px; margin-top: 5px; border: 1px solid var(--p-purple);
            display: none; z-index: 1000; overflow: hidden;
        }
        .ai-item { padding: 12px 20px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid var(--glass); }
        .ai-item:hover { background: var(--p-purple); }

        /* -----------------------------------------
           MODAIS E GRÁFICOS
        ------------------------------------------ */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .stat-card {
            background: var(--bg-card); border-radius: 20px; padding: 25px;
            border: 1px solid var(--glass-border);
        }
        .chart-container { height: 250px; position: relative; }

    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="auth-screen" style="position:fixed; inset:0; z-index:9999; background:var(--bg-deep); display:flex; align-items:center; justify-content:center;">
        <div style="width:100%; max-width:400px; padding:40px; background:var(--bg-card); border-radius:24px; border:1px solid var(--glass-border);">
            <h1 style="text-align:center; margin-bottom:30px; color:var(--p-purple);">Finanças Elite</h1>
            <input type="email" id="login-email" placeholder="E-mail" style="width:100%; padding:15px; margin-bottom:15px; border-radius:12px; background:var(--bg-deep); border:1px solid var(--glass-border); color:white;">
            <input type="password" id="login-pass" placeholder="Senha" style="width:100%; padding:15px; margin-bottom:25px; border-radius:12px; background:var(--bg-deep); border:1px solid var(--glass-border); color:white;">
            <button id="btn-do-login" class="btn-primary" style="width:100%; padding:15px; background:var(--p-purple); border:none; border-radius:12px; color:white; font-weight:bold; cursor:pointer;">Entrar no Sistema</button>
        </div>
    </div>

    <div id="main-wrapper">
        <aside>
            <div style="font-size: 22px; font-weight: 800; color: var(--p-purple); margin-bottom: 50px;">ELITE AI <span style="color:white">FIN</span></div>
            <nav>
                <a href="#" class="nav-link active" data-nav="dashboard">Dashboard</a>
                <a href="#" class="nav-link" data-nav="transactions">Histórico</a>
                <a href="#" class="nav-link" data-nav="goals">Metas & Sonhos</a>
                <a href="#" class="nav-link" data-nav="planning">Planejamento</a>
                <a href="#" class="nav-link" data-nav="settings">Configurações</a>
            </nav>
            <div style="margin-top:auto">
                <button id="btn-logout" style="background:none; border:none; color:var(--s-red); cursor:pointer; font-weight:600;">Sair do Sistema</button>
            </div>
        </aside>

        <main>
            <div class="top-bar">
                <div>
                    <h2 id="welcome-msg">Olá, Caroline & Marlon</h2>
                    <p style="color:var(--text-mid)">Seu assistente financeiro IA está ativo.</p>
                </div>
                <div style="display:flex; gap:15px">
                    <button id="btn-global-add" style="padding:12px 24px; background:var(--p-purple); border-radius:12px; border:none; color:white; font-weight:bold; cursor:pointer;">+ Nova Transação</button>
                    <button class="icon-btn" id="btn-notif-center" style="background:var(--bg-card); border:1px solid var(--glass-border); padding:10px; border-radius:12px; color:white; cursor:pointer;">🔔</button>
                </div>
            </div>

            <div class="ai-assistant-bar">
                <span style="font-size:20px">🤖</span>
                <input type="text" id="ai-input" placeholder="Pergunte algo ou digite uma despesa (ex: Mercado R$ 250)...">
                <div class="ai-suggestion-box" id="ai-suggestions"></div>
            </div>

            <div class="carousel-container">
                <button id="car-prev" class="carousel-btn" style="position:absolute; left:0; z-index:100; background:none; border:none; color:white; font-size:40px; cursor:pointer;">‹</button>
                <div class="carousel-3d-scene" id="main-scene">
                    </div>
                <button id="car-next" class="carousel-btn" style="position:absolute; right:0; z-index:100; background:none; border:none; color:white; font-size:40px; cursor:pointer;">›</button>
            </div>

            <div class="grid-stats">
                <div class="stat-card">
                    <h3>Gastos por Categoria</h3>
                    <div class="chart-container"><canvas id="chart-categories"></canvas></div>
                </div>
                <div class="stat-card">
                    <h3>Projeção de Saldo Mensal</h3>
                    <div class="chart-container"><canvas id="chart-projection"></canvas></div>
                </div>
                <div class="stat-card">
                    <h3>Meta: Casamento 2026</h3>
                    <div style="margin-top:20px">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                            <span>Progresso</span>
                            <span id="meta-percent">30%</span>
                        </div>
                        <div style="height:12px; background:var(--bg-deep); border-radius:6px; overflow:hidden">
                            <div id="meta-bar" style="width:30%; height:100%; background:var(--p-purple); box-shadow:0 0 15px var(--p-glow)"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        /**
         * ENGINE CORE - ELITE FINANCEIRO AI
         * Este script utiliza o padrão de State Management para garantir que 
         * todos os dados reflitam em tempo real em todos os botões e gráficos.
         */
        
        class EliteApp {
            constructor() {
                this.state = {
                    user: null,
                    transactions: [],
                    currentView: 'nosso',
                    carouselIndex: 0,
                    notifications: [],
                    categories: ['Alimentação', 'Moradia', 'Transporte', 'Lazer', 'Investimentos']
                };
                
                this.init();
            }

            async init() {
                console.log("🚀 Iniciando Engine Elite...");
                this.setupCoreListeners();
                this.initNotificationSystem();
                this.initIAAssistant();
            }

            // --- SISTEMA DE NOTIFICAÇÕES INTELIGENTES ---
            notify(message, type = 'info') {
                const container = document.getElementById('notification-container');
                const id = Date.now();
                const html = `
                    <div class="notif ${type}" id="notif-${id}">
                        <div class="notif-content">
                            <strong>Notificação</strong>
                            <p>${message}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
                setTimeout(() => document.getElementById(`notif-${id}`)?.remove(), 5000);
            }

            // --- MOTOR DE INTERAÇÃO (RESOLVE O PROBLEMA DOS BOTÕES) ---
            setupCoreListeners() {
                // Delegação de Eventos: Captura cliques em qualquer lugar do body 
                // e filtra pelos IDs ou Classes, eliminando bloqueios de z-index.
                document.body.addEventListener('click', (e) => {
                    const target = e.target;

                    if (target.id === 'btn-global-add') this.handleNewTransaction();
                    if (target.id === 'btn-logout') this.handleLogout();
                    if (target.id === 'car-next') this.rotateCarousel(1);
                    if (target.id === 'car-prev') this.rotateCarousel(-1);
                    if (target.classList.contains('nav-link')) this.handleNavigation(target);
                });

                // Escuta Auth do Firebase
                auth.onAuthStateChanged(user => {
                    if (user) {
                        this.state.user = user;
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-wrapper').classList.add('auth-active');
                        this.notify(`Bem-vindo, ${user.email}`, 'success');
                        this.loadData();
                    } else {
                        document.getElementById('auth-screen').style.display = 'flex';
                        document.getElementById('main-wrapper').classList.remove('auth-active');
                    }
                });
            }

            // --- INTELIGÊNCIA ARTIFICIAL (IA) - AUTOCOMPLETE & SUGESTÃO ---
            initIAAssistant() {
                const input = document.getElementById('ai-input');
                const suggestBox = document.getElementById('ai-suggestions');

                input.addEventListener('input', (e) => {
                    const val = e.target.value.toLowerCase();
                    if (val.length < 2) { suggestBox.style.display = 'none'; return; }

                    // Lógica de Previsão de categoria
                    const match = this.state.categories.filter(c => c.toLowerCase().includes(val));
                    
                    if (match.length > 0) {
                        suggestBox.innerHTML = match.map(m => `<div class="ai-item">💡 Adicionar à categoria: <strong>${m}</strong></div>`).join('');
                        suggestBox.style.display = 'block';
                    }
                });
            }
            // --- MOTOR DE ROTAÇÃO 3D (Cálculos de Perspectiva) ---
            rotateCarousel(direction) {
                const scene = document.getElementById('main-scene');
                this.state.carouselIndex += direction;
                const angle = this.state.carouselIndex * -120; // 360 / 3 cards = 120 graus
                scene.style.transform = `rotateY(${angle}deg)`;
                
                // Feedback tátil/sonoro simulado
                this.notify("Visualização de dados atualizada", "info");
                this.updateActiveCardUI();
            }

            updateActiveCardUI() {
                const cards = document.querySelectorAll('.c-card');
                const activeIdx = Math.abs(this.state.carouselIndex % 3);
                cards.forEach((c, i) => {
                    c.classList.toggle('active', i === activeIdx);
                    // Aplica brilho extra no card ativo
                    c.style.boxShadow = i === activeIdx ? `0 0 30px ${this.getComputedStyleValue('--p-glow')}` : 'none';
                });
            }

            // --- DASHBOARD: GRÁFICOS DINÂMICOS (Chart.js) ---
            renderCharts() {
                const ctxCat = document.getElementById('chart-categories').getContext('2d');
                const ctxProj = document.getElementById('chart-projection').getContext('2d');

                // Gráfico de Categorias (Rosca Premium)
                new Chart(ctxCat, {
                    type: 'doughnut',
                    data: {
                        labels: this.state.categories,
                        datasets: [{
                            data: [1200, 2500, 800, 450, 2000],
                            backgroundColor: ['#8b5cf6', '#10b981', '#ef4444', '#f59e0b', '#3b82f6'],
                            borderWidth: 0,
                            hoverOffset: 20
                        }]
                    },
                    options: { 
                        cutout: '75%',
                        plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } }
                    }
                });

                // Gráfico de Projeção (Linha de Tendência IA)
                new Chart(ctxProj, {
                    type: 'line',
                    data: {
                        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
                        datasets: [{
                            label: 'Previsão de Saldo',
                            data: [5000, 5800, 5200, 6100, 7500, 8900],
                            borderColor: '#8b5cf6',
                            backgroundColor: 'rgba(139, 92, 246, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        scales: {
                            y: { grid: { color: '#1e1e2e' }, ticks: { color: '#94a3b8' } },
                            x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                        }
                    }
                });
            }

            // --- GESTÃO DE DADOS FIREBASE (Sincronização Profunda) ---
            async loadData() {
                if (!this.state.user) return;

                // 1. Carregar Transações com Listener em Tempo Real
                db.collection('transactions')
                    .where('uid', '==', this.state.user.uid)
                    .orderBy('date', 'desc')
                    .onSnapshot(snap => {
                        this.state.transactions = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                        this.updateBalanceUI();
                        this.checkSmartAlerts();
                    });

                // 2. Carregar Metas
                this.updateGoalsUI();
                
                // Inicializar Gráficos após carregar dados
                this.renderCharts();
                this.renderCarouselCards();
            }

            renderCarouselCards() {
                const scene = document.getElementById('main-scene');
                const data = [
                    { label: "Saldo Total", val: "R$ 12.450,00", color: "var(--text-high)" },
                    { label: "Receitas", val: "R$ 8.200,00", color: "var(--s-green)" },
                    { label: "Despesas", val: "R$ 3.750,00", color: "var(--s-red)" }
                ];

                scene.innerHTML = data.map((item, i) => `
                    <div class="c-card ${i === 0 ? 'active' : ''}" style="transform: rotateY(${i * 120}deg) translateZ(250px);">
                        <span style="color:var(--text-mid); font-weight:600;">${item.label}</span>
                        <h2 style="font-size:32px; color:${item.color}">${item.val}</h2>
                        <div style="font-size:12px; color:var(--text-low)">Atualizado agora via IA</div>
                    </div>
                `).join('');
            }

            // --- IA: ALERTAS INTELIGENTES & AUTOCOMPLETAR ---
            checkSmartAlerts() {
                const lastExp = this.state.transactions.find(t => t.type === 'expense');
                if (lastExp && lastExp.amount > 1000) {
                    this.notify(`Alerta IA: Gasto incomum detectado em "${lastExp.description}". Isso compromete 12% da sua meta de Casamento.`, "warn");
                }
            }

            // --- SISTEMA DE METAS DINÂMICAS ---
            updateGoalsUI() {
                const totalInvestido = 15000;
                const metaCasamento = 50000;
                const percent = (totalInvestido / metaCasamento) * 100;
                
                document.getElementById('meta-bar').style.width = `${percent}%`;
                document.getElementById('meta-percent').innerText = `${Math.floor(percent)}%`;
            }

            // --- EVENTOS DE MODAL E TRANSAÇÃO ---
            handleNewTransaction() {
                this.notify("Abrindo painel de registro...", "info");
                // Aqui entraria a lógica de abrir o modal (conforme estrutura da parte 1)
                // Implementando preenchimento automático inteligente
                const aiField = document.getElementById('ai-input');
                aiField.focus();
                this.notify("Use o assistente IA para registrar rápido!", "success");
            }

            handleLogout() {
                auth.signOut().then(() => {
                    this.notify("Sessão encerrada com segurança.", "info");
                });
            }

            handleNavigation(el) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                el.classList.add('active');
                this.notify(`Navegando para: ${el.innerText}`, "info");
            }

            getComputedStyleValue(varName) {
                return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
            }
        }

        // --- INSTANCIAÇÃO FINAL ---
        const App = new EliteApp();

        // Correção de Eventos de Touch para Mobile no Carrossel
        let touchStartX = 0;
        document.getElementById('main-scene').addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
        document.getElementById('main-scene').addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].clientX;
            if (touchStartX - touchEndX > 50) App.rotateCarousel(1);
            if (touchStartX - touchEndX < -50) App.rotateCarousel(-1);
        });

    </script>
</body>
</html>
