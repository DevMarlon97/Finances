<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>

<style>

/* ===================== ROOT ===================== */

:root{
    --bg:#0f172a;
    --card:rgba(255,255,255,0.06);
    --glass:rgba(255,255,255,0.08);
    --primary:#00f5ff;
    --secondary:#7c3aed;
    --danger:#ff4d4d;
    --success:#22c55e;
    --text:#f1f5f9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#111827);
    color:var(--text);
    overflow:hidden;
}

/* ===================== HEADER ===================== */

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    backdrop-filter:blur(15px);
    background:var(--glass);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:1000;
}

.logo{
    font-size:20px;
    font-weight:bold;
    text-shadow:0 0 8px var(--primary);
}

.hamburger{
    cursor:pointer;
    font-size:24px;
}

/* ===================== SIDEBAR ===================== */

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:250px;
    height:100vh;
    backdrop-filter:blur(20px);
    background:rgba(15,23,42,0.8);
    border-right:1px solid rgba(255,255,255,0.1);
    transition:0.4s;
    padding-top:90px;
    z-index:1200;
}

.sidebar.active{
    left:0;
}

.sidebar a{
    display:block;
    padding:15px 20px;
    text-decoration:none;
    color:var(--text);
    transition:0.3s;
}

.sidebar a:hover{
    background:var(--primary);
    color:#000;
}

/* ===================== CARROSSEL ===================== */

.pages-wrapper{
    display:flex;
    height:100vh;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
}

.pages-wrapper::-webkit-scrollbar{
    display:none;
}

.page{
    flex:0 0 100%;
    height:100vh;
    overflow-y:auto;
    padding:90px 20px 120px;
    scroll-snap-align:start;
}

/* ===================== CARD ===================== */

.card{
    background:var(--card);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 0 15px rgba(0,245,255,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(0,245,255,0.4);
}

/* ===================== EXTRATO ===================== */

.transaction{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.transaction:last-child{
    border-bottom:none;
}

.transaction .left{
    display:flex;
    align-items:center;
    gap:10px;
}

.icon{
    font-size:18px;
}

.amount{
    font-weight:bold;
}

.amount.in{
    color:var(--success);
}

.amount.out{
    color:var(--danger);
}

/* ===================== BOTÃO ===================== */

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:var(--primary);
    color:#000;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    box-shadow:0 0 15px var(--primary);
}

/* ===================== NAV ===================== */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:70px;
    backdrop-filter:blur(15px);
    background:var(--glass);
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid rgba(255,255,255,0.1);
}

.nav-item{
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}

.nav-item.active{
    color:var(--primary);
    text-shadow:0 0 8px var(--primary);
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">FinControl</div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>

<div class="sidebar" id="sidebar">
    <a href="#" onclick="switchTab('home')">Início</a>
    <a href="#" onclick="switchTab('extrato')">Extrato</a>
    <a href="#" onclick="switchTab('grupos')">Grupos</a>
    <a href="#" onclick="switchTab('vinculo')">Vincular</a>
</div>

<div class="pages-wrapper" id="pagesWrapper">

<div id="page-home" class="page">
    <div class="card">
        <h2>Saldo Atual</h2>
        <h1>R$ 5.320,00</h1>
    </div>

    <div class="card">
        <h3>Resumo Mensal</h3>
        <p>Receitas: R$ 8.000</p>
        <p>Despesas: R$ 2.680</p>
    </div>
</div>

<div id="page-extrato" class="page">
    <div class="card">
        <h2>Extrato</h2>

        <div class="transaction">
            <div class="left">
                <div class="icon">💼</div>
                <div>Salário</div>
            </div>
            <div class="amount in">+ R$ 5.000</div>
        </div>

        <div class="transaction">
            <div class="left">
                <div class="icon">🍔</div>
                <div>Alimentação</div>
            </div>
            <div class="amount out">- R$ 120</div>
        </div>

    </div>
</div>

<div id="page-grupos" class="page">
    <div class="card">
        <h2>Grupos</h2>
        <p>Nenhum grupo criado ainda.</p>
        <button onclick="alert('Criar grupo em breve')">Criar Grupo</button>
    </div>
</div>

<div id="page-vinculo" class="page">
    <div class="card">
        <h2>Vincular Conta</h2>
        <button>Adicionar Conta</button>
    </div>
</div>

</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('home',this)">Início</div>
    <div class="nav-item" onclick="switchTab('extrato',this)">Extrato</div>
    <div class="nav-item" onclick="switchTab('grupos',this)">Grupos</div>
    <div class="nav-item" onclick="switchTab('vinculo',this)">Vincular</div>
</div>

<script>

/* ===================== MENU ===================== */

function toggleMenu(){
    document.getElementById('sidebar').classList.toggle('active');
}

/* ===================== SWITCH TAB ===================== */

function switchTab(id,btn){

    const wrapper = document.getElementById('pagesWrapper');
    const page = document.getElementById('page-'+id);

    wrapper.scrollTo({
        left: page.offsetLeft,
        behavior:'smooth'
    });

    document.querySelectorAll('.nav-item')
        .forEach(i=>i.classList.remove('active'));

    if(btn){
        btn.classList.add('active');
    }

    document.getElementById('sidebar').classList.remove('active');
}

/* ===================== SCROLL ATIVA NAV ===================== */

const wrapper = document.getElementById('pagesWrapper');

wrapper.addEventListener('scroll',()=>{

    const pages = document.querySelectorAll('.page');
    const navItems = document.querySelectorAll('.nav-item');

    pages.forEach((page,index)=>{
        const rect = page.getBoundingClientRect();
        if(rect.left >=0 && rect.left < window.innerWidth/2){
            navItems.forEach(i=>i.classList.remove('active'));
            navItems[index].classList.add('active');
        }
    });

});

</script>

</body>
</html>
