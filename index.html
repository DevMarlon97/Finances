<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gems Elite Pro 💎</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root{
--bg:#020617;
--primary:#a78bfa;
--primary-dark:#7c3aed;
--secondary:#10b981;
--danger:#f43f5e;
--surface:rgba(30,41,59,0.4);
--glass:rgba(255,255,255,0.03);
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
background-image:radial-gradient(circle at 50% -20%,#1e1b4b,var(--bg));
color:white;
margin:0;
height:100vh;
overflow:hidden;
}

/* HEADER */
.app-header{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
z-index:1000;
background:rgba(2,6,23,0.7);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-280px;
width:280px;
height:100%;
background:#0f172a;
z-index:3000;
transition:.4s;
box-shadow:20px 0 50px rgba(0,0,0,.5);
padding:40px 25px;
box-sizing:border-box;
}
.sidebar.open{left:0;}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
z-index:2500;
backdrop-filter:blur(4px);
}
.overlay.active{display:block;}

/* CARROSSEL */
.carousel-container{
position:absolute;
top:70px;
left:0;
width:100%;
height:calc(100vh - 70px);
display:flex;
overflow-x:auto;
overflow-y:hidden;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}
.carousel-container::-webkit-scrollbar{display:none;}

.page{
flex:0 0 100%;
height:100%;
overflow-y:auto;
scroll-snap-align:start;
padding-bottom:120px;
}

/* RESTO VISUAL */
.balance-card{
background:linear-gradient(135deg,#6366f1,#a855f7);
margin:0 20px 25px;
padding:35px 25px;
border-radius:32px;
box-shadow:0 20px 40px rgba(99,102,241,.2);
text-align:center;
}

.glass-box{
background:var(--surface);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
border-radius:28px;
padding:25px;
margin:0 20px;
}

input{
width:100%;
padding:18px;
border-radius:18px;
border:1px solid rgba(255,255,255,.1);
background:rgba(0,0,0,.2);
color:white;
font-size:1rem;
box-sizing:border-box;
margin-bottom:15px;
}

.btn-main{
width:100%;
padding:18px;
border-radius:18px;
border:none;
background:var(--primary);
color:white;
font-weight:800;
cursor:pointer;
}

.transaction-item{
display:flex;
justify-content:space-between;
align-items:center;
background:var(--glass);
padding:16px;
border-radius:20px;
margin:0 20px 10px;
}

.bottom-nav{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:85%;
height:75px;
background:rgba(15,23,42,.9);
backdrop-filter:blur(20px);
border-radius:25px;
display:flex;
align-items:center;
justify-content:space-around;
z-index:1000;
}

.nav-item{
font-size:1.3rem;
opacity:.3;
text-align:center;
cursor:pointer;
transition:.3s;
}
.nav-item.active{
opacity:1;
color:var(--primary);
transform:translateY(-5px);
}

.hidden{display:none!important;}
</style>
</head>
<body>

<div class="overlay" id="mainOverlay" onclick="closeAllMenus()"></div>

<div class="app-header">
<div onclick="toggleSidebar()" style="font-size:1.5rem;cursor:pointer">☰</div>
<div style="font-weight:900;font-size:1.2rem;">GEMS ELITE 💎</div>
<div onclick="toggleNotifs()">🔔</div>
</div>

<div class="sidebar" id="sidebar">
<div onclick="switchTab('home');toggleSidebar()">🏠 Início</div>
<div onclick="switchTab('extrato');toggleSidebar()">📜 Extrato</div>
<div onclick="switchTab('vinculo');toggleSidebar()">👥 Grupo</div>
<button onclick="logout()" style="position:absolute;bottom:40px;width:80%;background:none;border:1px solid var(--danger);color:var(--danger);padding:12px;border-radius:12px;">Sair</button>
</div>

<!-- CARROSSEL -->
<div class="carousel-container" id="carousel">

<div id="page-home" class="page">
<div class="balance-card">
<h1 id="saldoDisplay">R$ 0,00</h1>
</div>

<div class="glass-box">
<input type="text" id="desc" placeholder="Descrição">
<input type="number" id="valor" placeholder="Valor">
<button class="btn-main" onclick="addTransaction()">Lançar 🚀</button>
</div>

<div id="listaHome"></div>
</div>

<div id="page-extrato" class="page">
<div style="padding:20px;">
<h2>Extrato</h2>
<div id="listaExtrato"></div>
</div>
</div>

<div id="page-vinculo" class="page">
<div style="padding:20px;">
<h2>Grupo</h2>
<div id="members-list"></div>
</div>
</div>

</div>

<div class="bottom-nav">
<div class="nav-item active" onclick="switchTab('home',this)">🏠<br><small>Início</small></div>
<div class="nav-item" onclick="switchTab('extrato',this)">📜<br><small>Extrato</small></div>
<div class="nav-item" onclick="switchTab('vinculo',this)">👥<br><small>Grupo</small></div>
</div>

<script>
function switchTab(id,btn){
document.getElementById("page-"+id)
.scrollIntoView({behavior:"smooth",inline:"start"});
document.querySelectorAll(".nav-item").forEach(i=>i.classList.remove("active"));
if(btn) btn.classList.add("active");
}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("open");
document.getElementById("mainOverlay").classList.toggle("active");
}

function closeAllMenus(){
document.getElementById("sidebar").classList.remove("open");
document.getElementById("mainOverlay").classList.remove("active");
}

function toggleNotifs(){}

function logout(){auth.signOut().then(()=>location.reload());}
</script>

</body>
</html>
