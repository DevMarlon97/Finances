<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gems Elite Pro 💎</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --bg: #030712; 
            --primary: #8b5cf6; 
            --primary-glow: rgba(139, 92, 246, 0.4);
            --secondary: #10b981; 
            --secondary-glow: rgba(16, 185, 129, 0.3);
            --danger: #ef4444; 
            --card: rgba(15, 23, 42, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: white; margin: 0; height: 100vh; width: 100vw;
            overflow: hidden; perspective: 1500px;
        }

        /* Camada de Partículas */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at 50% -20%, #1e1b4b, var(--bg));
        }

        /* 3D Carousel */
        #viewport {
            width: 100%; height: 100%;
            position: relative; transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .page { 
            position: absolute; width: 100vw; height: 100vh; 
            overflow-y: auto; padding: 20px; padding-bottom: 120px;
            backface-visibility: hidden;
        }

        #page-home { transform: rotateY(0deg) translateZ(50vw); }
        #page-extrato { transform: rotateY(90deg) translateZ(50vw); }
        #page-vinculo { transform: rotateY(180deg) translateZ(50vw); }

        /* UI Elements */
        .main-card { 
            background: linear-gradient(135deg, var(--primary), #6366f1);
            padding: 35px 20px; margin-bottom: 25px; border-radius: 32px; text-align: center;
            box-shadow: 0 15px 35px var(--primary-glow), inset 0 0 20px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .glass-form { 
            background: var(--card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 28px; 
            padding: 24px; margin-bottom: 20px;
        }

        input { 
            width: 100%; padding: 18px; border-radius: 18px; border: 1px solid var(--glass-border); 
            background: rgba(0, 0, 0, 0.3); color: white; font-size: 1rem;
            outline: none; margin-bottom: 12px;
        }

        .btn-add { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            background: var(--primary); color: white; font-weight: 800; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }

        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px; margin: 10px 0; background: rgba(255,255,255,0.03); 
            border-radius: 22px; border: 1px solid var(--glass-border);
        }

        /* Nav Bar */
        .nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 85%; height: 75px; background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 25px; 
            display: flex; align-items: center; justify-content: space-around;
            border: 1px solid var(--glass-border); z-index: 1000;
        }

        .nav-btn { font-size: 1.4rem; opacity: 0.3; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--primary); transform: translateY(-5px); }
        .nav-btn small { display: block; font-size: 0.6rem; font-weight: 800; }

        #login-screen, #onboarding-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="login-screen">
        <div class="glass-form" style="width: 85%; text-align: center;">
            <h1 style="margin-bottom:25px">Gems Elite 💎</h1>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-add" onclick="login()">Entrar / Criar Conta</button>
        </div>
    </div>

    <div id="onboarding-screen" class="hidden">
        <div class="glass-form" style="width: 85%; text-align: center;">
            <h2>Bem-vindo! 👋</h2>
            <input type="text" id="nickname" placeholder="Seu apelido">
            <button class="btn-add" onclick="saveNickname()">Começar</button>
        </div>
    </div>

    <div id="viewport">
        <div id="page-home" class="page">
            <div class="main-card">
                <p id="welcome-msg" style="opacity:0.8">Carregando...</p>
                <h1 id="saldoDisplay" style="font-size: 2.8rem; margin: 10px 0;">R$ 0,00</h1>
                <small style="letter-spacing: 3px; opacity: 0.6;">SALDO ATUAL</small>
            </div>
            <div class="glass-form">
                <input type="text" id="desc" placeholder="O que foi?" oninput="handleInput(this)">
                <input type="number" id="valor" placeholder="R$ 0,00" step="0.01">
                <div id="tag-tipo" style="height:25px; font-size:0.75rem; font-weight:800; margin-bottom:12px; text-align:center;"></div>
                <button class="btn-add" onclick="addTransaction()">Lançar Agora 🚀</button>
            </div>
            <div id="listaHome"></div>
        </div>

        <div id="page-extrato" class="page">
            <h2 style="padding: 20px 10px;">Extrato 📜</h2>
            <div id="listaExtrato" style="padding: 0 10px;"></div>
            <button id="btnLimpar" class="btn-add" onclick="limparExtrato()" style="margin: 20px; width: calc(100% - 40px); background: none; border: 1px solid var(--danger); color: var(--danger);">Limpar Extrato</button>
        </div>

        <div id="page-vinculo" class="page">
            <h2 style="padding: 20px 10px;">Grupo 👥</h2>
            <div class="glass-form">
                <div id="members-list"></div>
                <hr style="opacity:0.1; margin: 20px 0;">
                <button class="btn-add" onclick="createInviteCode()" style="background:none; border: 1px solid var(--primary);">Gerar Chave</button>
                <div id="invite-display" style="text-align:center; font-size:1.8rem; margin: 15px 0; color: var(--secondary);"></div>
                <input type="text" id="code-input" placeholder="Chave de vínculo">
                <button class="btn-add" onclick="joinByCode()">Vincular</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="switchTab(0, this)">🏠<small>Home</small></div>
        <div class="nav-btn" onclick="switchTab(1, this)">📜<small>Extrato</small></div>
        <div class="nav-btn" onclick="switchTab(2, this)">👥<small>Grupo</small></div>
    </div>

    <script>
        // --- MOTOR DE PARTÍCULAS ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<50; i++) particles.push({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                r: Math.random() * 2 + 1, d: Math.random() * 0.5 + 0.1
            });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(139, 92, 246, 0.3)";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y -= p.d; if(p.y < -10) p.y = canvas.height + 10;
            });
            requestAnimationFrame(animate);
        }
        initCanvas(); animate();

        // --- NAVEGAÇÃO 3D ---
        let currentTab = 0;
        function switchTab(index, btn) {
            currentTab = index;
            document.getElementById('viewport').style.transform = `rotateY(${index * -90}deg)`;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            else document.querySelectorAll('.nav-btn')[index].classList.add('active');
        }

        // --- LÓGICA FIREBASE (Sua lógica original preservada) ---
        // [O script continua igual ao anterior, integrando as funções de login, addTransaction, etc.]
        // Reutilize as funções 'login', 'checkUser', 'saveNickname', 'handleInput', 'addTransaction', 'listenData' do código anterior.
        
        // Suporte para Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active.id === 'desc' || active.id === 'valor') addTransaction();
                if (active.id === 'email' || active.id === 'pass') login();
            }
        });
    </script>
</body>
</html>
