<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gems Elite Pro 💎</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --bg: #020617; 
            --primary: #a78bfa; 
            --primary-glow: rgba(167, 139, 250, 0.3);
            --secondary: #10b981; 
            --danger: #f43f5e; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Reset Total */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100dvh; width: 100vw;
            overflow: hidden; /* Trava scroll vertical do body */
            position: fixed; /* Evita bounce no iOS */
        }

        /* Header Fixa */
        .app-header {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 2000;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .logo-text { font-weight: 800; font-size: 0.9rem; letter-spacing: 1px; color: var(--primary); text-transform: uppercase; }

        /* Container do Carrossel */
        #app-viewport {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        #app-viewport::-webkit-scrollbar { display: none; }

        .page {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            overflow-y: auto;
            padding: 90px 0 120px 0; /* Espaço para header e nav */
        }

        /* Cards e Estilo */
        .balance-card {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            margin: 0 20px 20px; padding: 35px 20px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            text-align: center;
        }
        .glass-box {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 25px;
            padding: 20px; margin: 0 20px 20px;
        }

        input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 12px; outline: none;
        }

        .btn-main { 
            width: 100%; padding: 16px; border-radius: 15px; border: none; 
            background: var(--primary); color: white; font-weight: 800;
        }

        /* Lista de Transações */
        .transaction-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); padding: 16px; border-radius: 20px;
            margin: 0 20px 10px; border: 1px solid var(--glass-border);
        }

        /* Nav Inferior */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; height: 70px; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px); border-radius: 25px; display: flex;
            align-items: center; justify-content: space-around;
            border: 1px solid var(--glass-border); z-index: 2000;
        }
        .nav-item { font-size: 1.2rem; opacity: 0.3; transition: 0.3s; text-align: center; }
        .nav-item.active { opacity: 1; color: var(--primary); transform: translateY(-5px); }
        .nav-item small { display: block; font-size: 0.5rem; text-transform: uppercase; font-weight: 800; }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #0f172a; z-index: 3000; transition: 0.3s;
            padding: 40px 20px;
        }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; z-index: 2500; }
        .overlay.active { display: block; }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="overlay" id="mainOverlay" onclick="toggleSidebar()"></div>

    <div id="login-screen" class="hidden">
        <div class="glass-box" style="width: 85%;">
            <h2 style="text-align:center; margin-bottom: 20px;">Elite Login</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-main" onclick="login()">Entrar 💎</button>
        </div>
    </div>

    <div class="app-header">
        <div onclick="toggleSidebar()">☰</div>
        <div class="logo-text">GEMS ELITE PRO</div>
        <div onclick="location.reload()">🔄</div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 id="side-user-name">Usuário</h2>
        <p id="side-user-email" style="opacity:0.5; font-size:0.8rem; margin-bottom:30px;"></p>
        <div style="display:flex; flex-direction:column; gap:20px;">
            <div onclick="scrollToPage(0); toggleSidebar()">🏠 Início</div>
            <div onclick="scrollToPage(1); toggleSidebar()">📜 Extrato</div>
            <div onclick="scrollToPage(2); toggleSidebar()">👥 Grupo</div>
        </div>
        <button onclick="logout()" style="margin-top:50px; color:var(--danger); background:none; border:none;">SAIR</button>
    </div>

    <main id="app-viewport">
        <section class="page">
            <div class="balance-card">
                <small style="font-weight:800; opacity:0.7">SALDO ATUAL</small>
                <h1 id="saldoDisplay">R$ 0,00</h1>
            </div>
            <div class="glass-box">
                <input type="text" id="desc" placeholder="Descrição">
                <input type="number" id="valor" placeholder="Valor">
                <button class="btn-main" onclick="addTransaction()">Lançar 🚀</button>
            </div>
            <div id="listaHome"></div>
        </section>

        <section class="page">
            <h2 style="padding: 0 20px; margin-bottom: 20px;">Extrato Completo</h2>
            <div id="listaExtrato"></div>
        </section>

        <section class="page">
            <h2 style="padding: 0 20px; margin-bottom: 20px;">Gerenciar Grupo</h2>
            <div class="glass-box" id="members-list"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="scrollToPage(0)">🏠<small>Início</small></div>
        <div class="nav-item" onclick="scrollToPage(1)">📜<small>Extrato</small></div>
        <div class="nav-item" onclick="scrollToPage(2)">👥<small>Grupo</small></div>
    </nav>

    <script>
        // Lógica de Scroll Carrossel
        const vp = document.getElementById('app-viewport');
        const navs = document.querySelectorAll('.nav-item');

        function scrollToPage(i) {
            vp.scrollTo({ left: i * window.innerWidth, behavior: 'smooth' });
        }

        vp.addEventListener('scroll', () => {
            const i = Math.round(vp.scrollLeft / window.innerWidth);
            navs.forEach((n, idx) => n.classList.toggle('active', i === idx));
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mainOverlay').classList.toggle('active');
        }

        // --- INTEGRAÇÃO FIREBASE (Preservando sua lógica) ---
        let userData = {};

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                initApp(user);
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });

        async function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } 
            catch { alert("Erro ao entrar"); }
        }

        function initApp(user) {
            db.collection("usuarios").doc(user.uid).get().then(doc => {
                userData = doc.data();
                document.getElementById('side-user-name').innerText = userData.apelido;
                document.getElementById('side-user-email').innerText = user.email;
                loadData();
            });
        }

        function loadData() {
            db.collection("transacoes").where("pessoalUID", "==", auth.currentUser.uid)
              .onSnapshot(snap => {
                let total = 0;
                let html = "";
                snap.forEach(doc => {
                    const t = doc.data();
                    total += t.valor;
                    html += `<div class="transaction-item">
                        <span>${t.descricao}</span>
                        <b style="color:var(--secondary)">R$ ${t.valor.toFixed(2)}</b>
                    </div>`;
                });
                document.getElementById('saldoDisplay').innerText = `R$ ${total.toFixed(2)}`;
                document.getElementById('listaHome').innerHTML = html;
                document.getElementById('listaExtrato').innerHTML = html;
            });
        }

        async function addTransaction() {
            const d = document.getElementById('desc').value;
            const v = parseFloat(document.getElementById('valor').value);
            if(!d || !v) return;
            await db.collection("transacoes").add({
                descricao: d, valor: v,
                pessoalUID: auth.currentUser.uid,
                data: Date.now()
            });
            document.getElementById('desc').value = "";
            document.getElementById('valor').value = "";
            confetti();
        }

        async function logout() { await auth.signOut(); location.reload(); }
    </script>
</body>
</html>
