<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinControl Premium</title>

<style>

/* ================= ROOT ================= */

:root{
    --bg:#0b1120;
    --card:rgba(255,255,255,0.06);
    --glass:rgba(255,255,255,0.08);
    --primary:#00e5ff;
    --secondary:#7c3aed;
    --success:#22c55e;
    --danger:#ef4444;
    --text:#f1f5f9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:linear-gradient(145deg,#0b1120,#111827);
    color:var(--text);
    overflow:hidden;
}

/* ================= HEADER ================= */

.header{
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    backdrop-filter:blur(20px);
    background:var(--glass);
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:1000;
}

.logo{
    font-weight:bold;
    font-size:20px;
    text-shadow:0 0 10px var(--primary);
}

.hamburger{
    font-size:24px;
    cursor:pointer;
}

/* ================= SIDEBAR ================= */

.sidebar{
    position:fixed;
    left:-260px;
    top:0;
    width:250px;
    height:100vh;
    backdrop-filter:blur(25px);
    background:rgba(10,15,30,0.9);
    transition:0.4s;
    padding-top:90px;
    z-index:1200;
}

.sidebar.active{
    left:0;
}

.sidebar a{
    display:block;
    padding:15px 20px;
    color:var(--text);
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    background:var(--primary);
    color:#000;
}

/* ================= CARROSSEL 3D ================= */

.carousel{
    perspective:1200px;
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
}

.carousel-track{
    width:100%;
    height:100%;
    position:absolute;
    transform-style:preserve-3d;
    transition:transform 0.8s cubic-bezier(.77,0,.18,1);
}

.page{
    position:absolute;
    width:100%;
    height:100vh;
    padding:100px 20px 120px;
    backface-visibility:hidden;
    overflow-y:auto;
}

.page:nth-child(1){ transform:rotateY(0deg) translateZ(400px); }
.page:nth-child(2){ transform:rotateY(90deg) translateZ(400px); }
.page:nth-child(3){ transform:rotateY(180deg) translateZ(400px); }
.page:nth-child(4){ transform:rotateY(-90deg) translateZ(400px); }

/* ================= CARD ================= */

.card{
    background:var(--card);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,229,255,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 30px rgba(0,229,255,0.4);
}

/* ================= EXTRATO ================= */

.transaction{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.transaction .left{
    display:flex;
    gap:10px;
    align-items:center;
}

.icon{
    font-size:20px;
}

.amount.in{ color:var(--success); font-weight:bold; }
.amount.out{ color:var(--danger); font-weight:bold; }

/* ================= NAV ================= */

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    height:70px;
    backdrop-filter:blur(20px);
    background:var(--glass);
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top:1px solid rgba(255,255,255,0.1);
}

.nav-item{
    cursor:pointer;
    transition:0.3s;
}

.nav-item.active{
    color:var(--primary);
    text-shadow:0 0 10px var(--primary);
}

/* ================= NOTIFICAÇÃO ================= */

.toast{
    position:fixed;
    top:90px;
    right:20px;
    background:var(--secondary);
    padding:15px 20px;
    border-radius:12px;
    box-shadow:0 0 15px var(--secondary);
    animation:fadeIn 0.5s;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(-20px);}
    to{opacity:1;}
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">FinControl</div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
</div>

<div class="sidebar" id="sidebar">
    <a onclick="goTo(0)">Início</a>
    <a onclick="goTo(1)">Extrato</a>
    <a onclick="goTo(2)">Grupos</a>
    <a onclick="goTo(3)">Vincular</a>
</div>

<div class="carousel">
    <div class="carousel-track" id="track">

        <div class="page">
            <div class="card">
                <h2>Saldo Atual</h2>
                <h1>R$ 5.320,00</h1>
            </div>
        </div>

        <div class="page">
            <div class="card">
                <h2>Extrato</h2>

                <div class="transaction">
                    <div class="left">
                        <div class="icon">💼</div>
                        <div>Salário</div>
                    </div>
                    <div class="amount in">+ R$ 5.000</div>
                </div>

                <div class="transaction">
                    <div class="left">
                        <div class="icon">🍔</div>
                        <div>Alimentação</div>
                    </div>
                    <div class="amount out">- R$ 120</div>
                </div>

            </div>
        </div>

        <div class="page">
            <div class="card">
                <h2>Grupos</h2>
                <button onclick="showToast('Grupo criado com sucesso!')">Criar Grupo</button>
            </div>
        </div>

        <div class="page">
            <div class="card">
                <h2>Vincular Conta</h2>
                <button onclick="showToast('Conta vinculada!')">Adicionar</button>
            </div>
        </div>

    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="goTo(0)">Início</div>
    <div class="nav-item" onclick="goTo(1)">Extrato</div>
    <div class="nav-item" onclick="goTo(2)">Grupos</div>
    <div class="nav-item" onclick="goTo(3)">Vincular</div>
</div>

<script>

let current = 0;
const track = document.getElementById('track');

function goTo(index){
    current = index;
    track.style.transform = `rotateY(-${index*90}deg)`;
    document.querySelectorAll('.nav-item')
        .forEach((i,idx)=>i.classList.toggle('active',idx===index));
    document.getElementById('sidebar').classList.remove('active');
}

function toggleMenu(){
    document.getElementById('sidebar').classList.toggle('active');
}

/* SWIPE MOBILE */

let startX = 0;
document.addEventListener("touchstart",e=> startX=e.touches[0].clientX);

document.addEventListener("touchend",e=>{
    let diff = e.changedTouches[0].clientX - startX;
    if(diff > 50 && current>0) goTo(current-1);
    if(diff < -50 && current<3) goTo(current+1);
});

/* SCROLL DESKTOP */

document.addEventListener("wheel",e=>{
    if(e.deltaY>0 && current<3) goTo(current+1);
    if(e.deltaY<0 && current>0) goTo(current-1);
});

/* TOAST */

function showToast(msg){
    const toast = document.createElement("div");
    toast.className="toast";
    toast.innerText=msg;
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(),2500);
}

</script>

</body>
</html>
