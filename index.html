<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Elite - Dashboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <nav class="sidebar">
            <div class="logo">GEMSELITE</div>
            <ul class="nav-links">
                <li class="active"><a href="index.html">Dashboard</a></li>
                <li><a href="transacoes.html">Transações</a></li>
                <li><a href="planejamento.html">Planejamento</a></li>
                <li><a href="calendario-financeiro.html">Calendário</a></li>
                <li><a href="metas.html">Metas</a></li>
                
                <li style="margin-top: 30px;"><a href="#" id="resetAppBtn" style="color: var(--danger-red); font-weight: bold;">🗑️ Resetar App</a></li>
            </ul>
        </nav>

        <main class="main-content">
            
            <header style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h1 style="color: #fff; font-size: 2rem;">Visão Geral</h1>
                    <p style="color: var(--text-muted);">Analisando dados...</p>
                </div>
                
                <div style="min-width: 180px;">
                    <label for="userSwitch" style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;">Filtrar Visão:</label>
                    <select id="userSwitch" style="margin-top: 5px;">
                        <option value="ambos">Casal (Visão Geral)</option>
                        <option value="Caroline">Caroline</option>
                        <option value="Marlon">Marlon</option>
                    </select>
                </div>
            </header>

            <div class="swiper dashboardSwiper">
                <div class="swiper-wrapper">
                    
                    <div class="swiper-slide">
                        <div class="calendar-page-layout"> 
                            
                            <div class="glass-panel" style="flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center;">
                                <h3 style="color: var(--text-muted);">Patrimônio Líquido</h3>
                                <h2 id="totalBalance" style="font-size: 3rem; color: var(--text-main); margin: 10px 0;">R$ 0,00</h2>
                                <p style="color: var(--primary-cyan); font-weight: bold; font-size: 0.9rem;">↑ Saldo consolidado</p>
                                
                                <h3 style="margin-top: 2rem; color: var(--danger-red);">🔔 Alertas do Calendário</h3>
                                <div id="calendarAlerts" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary-cyan); font-size: 0.95rem; line-height: 1.5;">
                                    Analisando contas...
                                </div>
                            </div>
                            
                            <div class="glass-panel" style="flex: 2; min-width: 300px; height: 350px; position: relative;">
                                <canvas id="balanceChart"></canvas>
                            </div>
                            
                        </div>
                    </div>

                    <div class="swiper-slide">
                        <div class="glass-panel full-page-card" style="max-width: 500px; margin: 0 auto;">
                            <h3 style="text-align: center; font-size: 1.2rem; margin-bottom: 20px;">Registrar Movimentação</h3>
                            
                            <form id="quickTransactionForm">
                                <input type="text" id="desc" placeholder="Descrição (Ex: Mercado, Conta de Luz)" required>
                                <input type="number" id="valor" placeholder="Valor (R$)" step="0.01" required>
                                
                                <select id="tipo">
                                    <option value="despesa">Despesa (Saída)</option>
                                    <option value="receita">Receita (Entrada)</option>
                                </select>
                                
                                <select id="categoria">
                                    <optgroup label="Custos Fixos">
                                        <option value="Moradia / Aluguel">Moradia / Aluguel</option>
                                        <option value="Luz / Água / Gás">Luz / Água / Gás</option>
                                        <option value="Internet / Telefone">Internet / Telefone</option>
                                    </optgroup>
                                    <optgroup label="Transporte">
                                        <option value="Combustível">Combustível</option>
                                        <option value="IPVA / Licenciamento">IPVA / Licenciamento</option>
                                        <option value="Manutenção Auto">Manutenção Auto</option>
                                    </optgroup>
                                    <optgroup label="Alimentação & Lazer">
                                        <option value="Supermercado">Supermercado</option>
                                        <option value="Delivery / Restaurante">Delivery / Restaurante</option>
                                        <option value="Lazer / Passeios">Lazer / Passeios</option>
                                    </optgroup>
                                    <optgroup label="Objetivos">
                                        <option value="Casamento">Casamento</option>
                                        <option value="Investimentos">Investimentos / Poupança</option>
                                    </optgroup>
                                </select>
                                
                                <button type="submit" class="btn-primary">Efetivar Lançamento</button>
                            </form>
                        </div>
                    </div>

                    <div class="swiper-slide">
                        <div class="glass-panel full-page-card" id="mainGoal" style="max-width: 600px; margin: 0 auto;">
                            <div style="text-align: center; color: var(--text-muted); font-style: italic;">Carregando metas...</div>
                        </div>
                    </div>

                </div>
                
                <div class="swiper-button-next" style="color: var(--primary-cyan);"></div>
                <div class="swiper-button-prev" style="color: var(--primary-cyan);"></div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="app.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
