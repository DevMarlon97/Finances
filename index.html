<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Era | Financeiro Premium</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="firebase-config.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --primary-dark: #7e22ce;
            --bg: #030303;
            --card-bg: rgba(18, 18, 23, 0.85);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glow: 0 0 20px rgba(168, 85, 247, 0.3);
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* --- TELA DE LOGIN --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .auth-card {
            background: var(--card-bg); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(168, 85, 247, 0.2); backdrop-filter: blur(20px);
            width: 90%; max-width: 380px; text-align: center; box-shadow: var(--glow);
        }
        .auth-card h2 { margin-bottom: 25px; font-weight: 800; color: #fff; }
        input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
            border: 1px solid #1e1e26; background: #000; color: white; outline: none;
        }
        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; padding: 16px; width: 100%; border-radius: 12px;
            cursor: pointer; font-weight: 600; margin-top: 15px; box-shadow: var(--glow);
        }
        #error-msg { color: var(--danger); font-size: 13px; margin-top: 15px; display: none; }

        /* --- LAYOUT 3D --- */
        #app-content { display: none; }
        .menu-trigger { position: fixed; top: 25px; left: 25px; z-index: 1000; cursor: pointer; font-size: 24px; color: var(--primary); }
        
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: rgba(10, 10, 15, 0.98); z-index: 1001; transition: 0.4s;
            padding: 80px 20px; border-right: 1px solid var(--primary-dark);
        }
        .sidebar.active { left: 0; }

        .scene { width: 100vw; height: 100vh; perspective: 2000px; display: flex; justify-content: center; align-items: center; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1); }
        
        .face { position: absolute; width: 100vw; height: 100vh; padding: 100px 8% 40px 8%; backface-visibility: hidden; overflow-y: auto; }
        .face-front  { transform: rotateY(0deg) translateZ(50vw); }
        .face-right  { transform: rotateY(90deg) translateZ(50vw); }
        .face-back   { transform: rotateY(180deg) translateZ(50vw); }
        .face-left   { transform: rotateY(-90deg) translateZ(50vw); }

        .glass-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .progress-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2>Acesso Casal</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn-premium" onclick="login()">Entrar no Sistema</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <div id="app-content">
        <div class="menu-trigger" onclick="toggleSidebar()">☰</div>
        
        <div class="sidebar" id="sidebar">
            <div style="color: var(--primary); margin-bottom: 20px; font-weight: bold;">CONFIGURAÇÕES</div>
            <div onclick="logout()" style="color: var(--danger); cursor: pointer;">✕ Sair do App</div>
        </div>

        <div class="scene">
            <div class="cube" id="cube">
                <div class="face face-front">
                    <h1 style="font-size: 32px; margin-bottom: 20px;">Resumo do Mês</h1>
                    <div class="glass-card">
                        <p>Livre para Gastar</p>
                        <h2 style="color: var(--success); font-size: 36px;">R$ 4.500,00</h2>
                    </div>
                    <canvas id="chart1" style="max-height: 250px;"></canvas>
                </div>

                <div class="face face-right">
                    <h1>Nossas Metas</h1>
                    <div class="glass-card">
                        <h3>Fundo de Emergência</h3>
                        <div class="progress-bar"><div class="progress-fill" style="width: 75%;"></div></div>
                        <p style="font-size: 12px;">75% Concluído</p>
                    </div>
                </div>

                <div class="face face-back">
                    <h1>Histórico</h1>
                    <div class="glass-card">Mercado - R$ 250,00 (Ontem)</div>
                    <div class="glass-card">Luz - R$ 180,00 (Pendente)</div>
                </div>

                <div class="face face-left">
                    <h1>Área do Casal</h1>
                    <div class="glass-card">
                        <h3>Quem gastou mais?</h3>
                        <p>Você: 45% | Ela: 55%</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FUNÇÕES DE LOGIN (Sintaxe v8) ---
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const btn = document.querySelector('.btn-premium');

            btn.innerText = "Verificando...";
            btn.disabled = true;

            firebase.auth().signInWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    console.log("Logado com sucesso!");
                })
                .catch((error) => {
                    errorDiv.style.display = "block";
                    errorDiv.innerText = "Erro: Email ou senha inválidos.";
                    btn.innerText = "Entrar no Sistema";
                    btn.disabled = false;
                });
        }

        function logout() {
            firebase.auth().signOut();
        }

        // --- OBSERVAR ESTADO DO USUÁRIO ---
        firebase.auth().onAuthStateChanged((user) => {
            const authScreen = document.getElementById('auth-screen');
            const appContent = document.getElementById('app-content');

            if (user) {
                authScreen.style.opacity = '0';
                setTimeout(() => {
                    authScreen.style.display = 'none';
                    appContent.style.display = 'block';
                    renderCharts();
                }, 500);
            } else {
                authScreen.style.display = 'flex';
                appContent.style.display = 'none';
                authScreen.style.opacity = '1';
                document.querySelector('.btn-premium').disabled = false;
                document.querySelector('.btn-premium').innerText = "Entrar no Sistema";
            }
        });

        // --- NAVEGAÇÃO 3D ---
        let currentAngle = 0;
        const cube = document.getElementById('cube');

        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) currentAngle -= 90;
            else currentAngle += 90;
            cube.style.transform = `rotateY(${currentAngle}deg)`;
        }, { passive: true });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // --- GRÁFICOS ---
        function renderCharts() {
            const ctx = document.getElementById('chart1').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Contas', 'Lazer', 'Investimento'],
                    datasets: [{
                        data: [2000, 800, 1700],
                        backgroundColor: ['#a855f7', '#7e22ce', '#3b0764'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
        }
    </script>
</body>
</html>
