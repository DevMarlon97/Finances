<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alinha - Base Financeira</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f1117;
  color:white;
}

.hidden{display:none;}

section{padding:20px;}

h1,h2,h3{margin-top:0;}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{
  background:#4f7cff;
  color:white;
  cursor:pointer;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  margin-top:20px;
}

ul{
  list-style:none;
  padding:0;
}

progress{
  width:100%;
  height:12px;
}
</style>
</head>
<body>

<section id="login-screen">
  <h1>Alinha</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">
  <button id="login-btn">Entrar</button>
  <button id="register-btn">Criar Conta</button>
</section>

<section id="dashboard" class="hidden">
  <h2>Painel Futuro</h2>
  <button id="logout-btn">Sair</button>

  <div class="card">
    <h3>Adicionar Conta Futura</h3>
    <input type="text" id="bill-name" placeholder="Nome da Conta">
    <input type="number" id="bill-value" placeholder="Valor">
    <input type="date" id="bill-date">
    <select id="bill-type">
      <option value="mensal">Mensal</option>
      <option value="anual">Anual</option>
      <option value="unica">Única</option>
    </select>
    <button id="add-bill">Salvar</button>
  </div>

  <div class="card">
    <h3>Próximas Contas</h3>
    <ul id="future-list"></ul>
  </div>

  <div class="card">
    <h3>Cofre de Meta</h3>
    <input type="text" id="goal-name" placeholder="Nome da Meta">
    <input type="number" id="goal-target" placeholder="Valor Meta">
    <input type="number" id="goal-current" placeholder="Valor Atual">
    <button id="add-goal">Criar Meta</button>
    <div id="goals-list"></div>
  </div>
</section>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Seu arquivo de configuração -->
<script src="firebase-config.js"></script>

<!-- App JS -->
<script>
const loginScreen = document.getElementById("login-screen");
const dashboard = document.getElementById("dashboard");

const loginBtn = document.getElementById("login-btn");
const registerBtn = document.getElementById("register-btn");
const logoutBtn = document.getElementById("logout-btn");

const addBillBtn = document.getElementById("add-bill");
const futureList = document.getElementById("future-list");

const addGoalBtn = document.getElementById("add-goal");
const goalsList = document.getElementById("goals-list");

let currentUser = null;

// LOGIN
registerBtn.onclick = async () => {
  await firebase.auth().createUserWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  );
};

loginBtn.onclick = async () => {
  await firebase.auth().signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  );
};

logoutBtn.onclick = async () => {
  await firebase.auth().signOut();
};

// Detecta login
firebase.auth().onAuthStateChanged(user => {
  if(user){
    currentUser = user;
    loginScreen.classList.add("hidden");
    dashboard.classList.remove("hidden");
    loadBills();
    loadGoals();
  }else{
    loginScreen.classList.remove("hidden");
    dashboard.classList.add("hidden");
  }
});

// CONTAS FUTURAS
addBillBtn.onclick = async () => {
  await firebase.firestore().collection("futureBills").add({
    userId: currentUser.uid,
    name: document.getElementById("bill-name").value,
    value: parseFloat(document.getElementById("bill-value").value),
    date: document.getElementById("bill-date").value,
    type: document.getElementById("bill-type").value
  });
  loadBills();
};

async function loadBills(){
  futureList.innerHTML="";
  const snapshot = await firebase.firestore().collection("futureBills")
    .where("userId","==",currentUser.uid).get();

  snapshot.forEach(doc=>{
    const data = doc.data();
    const li = document.createElement("li");
    li.innerHTML = `${data.name} - R$ ${data.value} - ${data.date}`;
    futureList.appendChild(li);
  });
}

// METAS
addGoalBtn.onclick = async () => {
  await firebase.firestore().collection("goals").add({
    userId: currentUser.uid,
    name: document.getElementById("goal-name").value,
    target: parseFloat(document.getElementById("goal-target").value),
    current: parseFloat(document.getElementById("goal-current").value)
  });
  loadGoals();
};

async function loadGoals(){
  goalsList.innerHTML="";
  const snapshot = await firebase.firestore().collection("goals")
    .where("userId","==",currentUser.uid).get();

  snapshot.forEach(doc=>{
    const data = doc.data();
    const percent = ((data.current/data.target)*100).toFixed(1);
    const div = document.createElement("div");
    div.innerHTML = `
      <p>${data.name}</p>
      <p>${percent}% concluído</p>
      <progress value="${data.current}" max="${data.target}"></progress>
    `;
    goalsList.appendChild(div);
  });
}
</script>

</body>
</html>
